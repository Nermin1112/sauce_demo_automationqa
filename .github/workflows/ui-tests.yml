name: UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - run: |
          pytest \
            --html=report.html \
            --self-contained-html \
            -n auto \
            --capture=tee-sys

      - uses: actions/upload-artifact@v3
        with:
          name: ui-test-report
          path: report.html